<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon - różne rozmiary -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Statyczne meta - NIE zarządzane przez Helmet -->
    <meta name="author" content="MaturaPolski.pl" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="Polish" />

    <!-- OG statyczne (nie zmieniane per-page) -->
    <meta
      property="og:image"
      content="https://www.maturapolski.pl/og-image.png"
    />
    <meta property="og:site_name" content="MaturaPolski.pl" />
    <meta property="og:locale" content="pl_PL" />

    <!-- Twitter statyczne -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta
      property="twitter:image"
      content="https://www.maturapolski.pl/og-image.png"
    />

    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!-- Preconnect dla szybszego ładowania -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://accounts.google.com" />

    <!--
      UWAGA: Wszystkie poniższe tagi są WYŁĄCZNIE zarządzane przez react-helmet-async:
      - <title>
      - <meta name="title">
      - <meta name="description">
      - <meta name="keywords">
      - <link rel="canonical">
      - <meta property="og:title">
      - <meta property="og:description">
      - <meta property="og:url">
      - <meta property="og:type">
      - <meta property="twitter:url">
      - <meta property="twitter:title">
      - <meta property="twitter:description">
      - <script type="application/ld+json"> (structured data)

      NIE DODAWAJ ICH TUTAJ — Helmet wstrzykuje je dynamicznie per-page.
      Duplikaty powodują konflikt canonical i OG, co szkodzi SEO.
    -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
